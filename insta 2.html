<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Identity Sync | Insta-AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #0a0a0a, #000000);
            min-height: screen;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* 1. DYNAMIC SCANNING BACKGROUND */
        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            box-shadow: 0 0 20px #3b82f6;
            animation: scan 4s linear infinite;
            z-index: 0;
        }

        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* 2. ORBIT ANIMATION */
        .orbit-container {
            position: absolute;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }
        .orbiter {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            animation: orbit 10s linear infinite;
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(180px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
        }

        /* 3. PROFILE GLOW */
        .profile-ring {
            position: relative;
        }
        .profile-ring::before {
            content: '';
            position: absolute;
            inset: -10px;
            background: conic-gradient(from 0deg, transparent, #3b82f6, #a855f7, #ec4899, transparent);
            border-radius: 50%;
            animation: spin 3s linear infinite;
            filter: blur(15px);
            opacity: 0.5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-glow:focus {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }

        .fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="scanner-line"></div>
    
    <div class="orbit-container">
        <div class="orbiter" style="animation-delay: 0s"><i data-lucide="cpu" class="text-blue-500/40"></i></div>
        <div class="orbiter" style="animation-delay: -2.5s"><i data-lucide="sparkles" class="text-purple-500/40"></i></div>
        <div class="orbiter" style="animation-delay: -5s"><i data-lucide="shield" class="text-pink-500/40"></i></div>
        <div class="orbiter" style="animation-delay: -7.5s"><i data-lucide="globe" class="text-green-500/40"></i></div>
    </div>

    <div class="max-w-md w-full glass rounded-[4rem] p-12 relative z-10 text-center fade-in">
        
        <header class="mb-12">
            <div class="inline-block px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-[10px] uppercase tracking-[0.3em] text-blue-400 font-black mb-6">
                Stage 02: Biological Sync
            </div>
            <h2 class="text-5xl font-black tracking-tighter italic">Identity <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Core</span></h2>
        </header>

        <form id="setupForm" class="space-y-12">
            
            <div class="relative flex justify-center">
                <div class="profile-ring group cursor-pointer">
                    <div class="w-44 h-44 rounded-full bg-black border-2 border-white/10 overflow-hidden relative transition-transform duration-500 group-hover:scale-105 shadow-2xl">
                        <img id="avatarPreview" src="https://api.dicebear.com/7.x/bottts/svg?seed=Ayush" alt="AI Avatar" class="w-full h-full object-cover">
                        
                        <label for="upload" class="absolute inset-0 bg-blue-600/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 backdrop-blur-sm">
                            <i data-lucide="upload-cloud" class="mb-2"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">Update Essence</span>
                        </label>
                    </div>
                </div>
                <input type="file" id="upload" hidden accept="image/*" onchange="updatePreview(event)">
            </div>

            <div class="space-y-3">
                <div class="flex justify-between px-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Neural Handle</label>
                    <span id="charCount" class="text-[10px] text-gray-600 font-bold">0/15</span>
                </div>
                <div class="relative group">
                    <i data-lucide="at-sign" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="handle" maxlength="15" required placeholder="username" 
                        class="w-full pl-14 pr-6 py-5 bg-white/5 border border-white/10 rounded-[2rem] focus:outline-none input-glow transition-all text-xl font-bold tracking-tight">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="group relative w-full py-6 bg-white text-black font-black rounded-[2rem] overflow-hidden transition-all hover:pr-8 active:scale-95 shadow-xl shadow-white/5">
                <span id="btnText" class="relative z-10 uppercase tracking-[0.2em] font-black">Finalize Calibration</span>
                <div class="absolute right-8 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-4 group-hover:translate-x-0">
                    <i data-lucide="arrow-right"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-blue-100 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
            </button>
        </form>

        <p class="mt-10 text-[10px] text-gray-600 uppercase tracking-[0.4em] font-bold">Protocol: Secure End-to-End Neural Link</p>
    </div>

    <script>
        lucide.createIcons();

        function updatePreview(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('avatarPreview');
                img.src = reader.result;
                img.classList.add('brightness-150');
                setTimeout(() => img.classList.remove('brightness-150'), 400);
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        const handleInput = document.getElementById('handle');
        handleInput.addEventListener('input', (e) => {
            document.getElementById('charCount').innerText = `${e.target.value.length}/15`;
        });

        document.getElementById('setupForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            
            text.innerHTML = '<span class="flex items-center justify-center gap-4"><i data-lucide="loader-2" class="animate-spin"></i> SYNCING...</span>';
            lucide.createIcons();
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";
            
            setTimeout(() => {
                alert(`Neural Core Initialized: @${handleInput.value}`);
                window.location.href = "insta 3.html";
            }, 2500);
        };
    </script>
</body>
</html>
